<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 20pt Arial; 
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt("Qual é o seu nome? "); 
        document.writeln(`Olá <strong>${nome}</strong>! Seu nome tem ${nome.length} letras. <br>`);
        document.writeln(`Nome em maúsculo: ${nome.toUpperCase()} <br>`);
        document.writeln(`Nome em minúsculo: ${nome.toLowerCase()} <br>`);

        // n1.toLocaleString('pt-BR', {style: 'currency',currency: 'EUR'}) // vai ficar: '€ 1,545.50'
    </script>
</body>
</html>

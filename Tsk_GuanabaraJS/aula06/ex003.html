<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro programa</title>
    <style>
        body {
            background-color: rgb(105, 105, 173);
            color: white;
            font: normal 20pt Arial;
        }
        h1 {
            color: orange;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo</h1>
    <p>Me livrei da maldição!</p>
    <script>
        var n1 = window.prompt('Digite um número: '); // String
        var n2 = window.prompt('Digite outro número: '); // String
        var soma = Number.parseInt(n1) + Number.parseInt(n2); // convertido para inteiro
        window.alert(`Soma dos valores: ${soma.toString()}.`); // convertido para String e usando interpolação (não esquecer da crase ``)
        // window.alert('Soma dos valores: ' + soma.toString() + "."); // convertido para String
        // Para converter para string:
        // soma.toString();
        // String(soma);
    </script>
</body>
</html>

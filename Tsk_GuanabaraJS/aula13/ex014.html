<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background-color: rgb(63, 63, 216);
        }
        header {
            margin: auto;
            margin-top: 50px;
            margin-bottom: 20px;
            text-align: center;
            color: white;
        }
        header > h1 { 
            font-size: 3em;
        }
        section {
            margin: auto;
            background-color: #f9f9f9;
            width: 500px;
            border-radius: 10px;
            box-shadow: 1px 0px 6px black;
        }
        section > div {
            margin: auto;
        }
        footer {
            margin: 0px;
            margin-bottom: 50px;
        }
        footer > p {
            padding: 10px;
            color: white;
            text-align: center;
            text-shadow: 1px 0px 5px black;
        }
        footer > p > a {
            text-decoration: none;
            color: white;
            text-shadow: 1px 0px 5px black;
        }
    </style>
</head>
<body>
    <header>
        <h1>Título</h1>
    </header>
    <main>
        <section>
            <div>
                DIV 1
            </div>

            <div>
                DIV 2
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; <a href="github.com/devaxl64" target="_blank">devaxl64</a> feito com o Curso em Vídeo.</p>
    </footer>
</body>
</html>

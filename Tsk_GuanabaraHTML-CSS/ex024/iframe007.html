<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adicionando Conteúdos</title>
  </head>
  <body>
    <h1>Conteúdos dentro do iframe</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quis minima,
      nostrum tenetur at natus a maiores, ipsum voluptates harum, minus error ab
      quaerat rem amet aspernatur dolorem mollitia repellendus libero.
    </p>
    <h2>Vídeos</h2>
    <div>
      <iframe
        title="vimeo-player"
        src="https://player.vimeo.com/video/177118397?h=52d138b00e"
        width="640"
        height="360"
        frameborder="0"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="
          autoplay;
          fullscreen;
          picture-in-picture;
          clipboard-write;
          encrypted-media;
          web-share;
        "
        allowfullscreen
      ></iframe>
    </div>
    <h2>Mapas do Google</h2>
    <div>
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3675.296041360489!2d-43.174590699999996!3d-22.902449100000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x997f58a6a00a9d%3A0x3f251d85272f76f7!2sHostnet%20Internet!5e0!3m2!1spt-BR!2sbr!4v1773528889700!5m2!1spt-BR!2sbr"
        width="600"
        height="450"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
    <h2>Mapas do Waze</h2>
    <div>
      <iframe
        src="https://embed.waze.com/iframe?zoom=16&lat=-22.902449&lon=-43.174591&ct=livemap"
        width="600"
        height="450"
        allowfullscreen
      ></iframe>
    </div>
    <h2>Google Documents</h2>
    <div>
      <iframe
        src="https://docs.google.com/presentation/d/e/2PACX-1vRfNcKrjscTjTEFq1GcReAF_IkgRolpLMqlN27uY5Iv-5xRS-i1usNFEcDThSaxfZUlPP5BfughfLuF/pubembed?start=false&loop=false&delayms=3000"
        frameborder="0"
        width="480"
        height="299"
        allowfullscreen="true"
        mozallowfullscreen="true"
        webkitallowfullscreen="true"
      ></iframe>
    </div>
  </body>
</html>
